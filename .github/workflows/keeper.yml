name: Scheduled Payment Keeper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  keeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install ethers
        run: npm install ethers@6
      
      - name: Run keeper
        env:
          KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
        run: node keeper.js
