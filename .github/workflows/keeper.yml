name: Keeper (Fallback)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install ethers@6
      - name: Check if Railway ran recently and run if not
        run: node keeper-check.js
        env:
          KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PAYOUT_WALLET_ADDRESS: ${{ secrets.PAYOUT_WALLET_ADDRESS }}

      - name: Alert on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"             -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}"             -d text="🚨 SparkPay Keeper (Fallback) FAILED on GitHub Actions. Check: https://github.com/Sam50506/SparkPay/actions"             -d parse_mode="Markdown"
