name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts-hardhat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Solhint
        run: npx solhint 'contracts/**/*.sol'
        continue-on-error: true

      - name: Run Hardhat tests
        run: npx hardhat test

      - name: Run Slither
        uses: crytic/slither-action@v0.4.2
        with:
          target: contracts-hardhat/
          slither-args: --exclude-dependencies
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          CI: false
