name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts-hardhat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Clean stale build artifacts
        run: rm -rf artifacts cache

      - name: Run Solhint
        run: npx solhint 'contracts/**/*.sol'

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: 'contracts-hardhat'
          slither-args: '--filter-paths "node_modules"'
          node-version: '22'
          solc-version: '0.8.35'

      - name: Run Hardhat tests
        run: npx hardhat test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          CI: false
