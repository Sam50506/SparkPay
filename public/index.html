<html lang="en">
  <head>
    <meta charset="utf-8" />

    <meta name="theme-color" content="#000000" /><style>
html,body,#root{background:#000;margin:0;padding:0;height:100%;}
#root:empty::after{
  content:'';
  position:fixed;inset:0;
  background:#000;
  display:flex;
}
#sp-loader{
  position:fixed;inset:0;background:#000;
  display:flex;align-items:center;justify-content:center;
  z-index:99999;transition:opacity .3s ease;
}
#sp-loader svg{animation:sp-pulse 1s ease infinite alternate;}
@keyframes sp-pulse{from{opacity:0.4;}to{opacity:1;}}
</style>
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
<div id="sp-loader">
  <svg width="48" height="72" viewBox="0 0 30 44" fill="none">
    <defs>
      <linearGradient id="lg" x1="15" y1="0" x2="15" y2="44" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#fff"/>
        <stop offset="45%" stop-color="#7AACFF"/>
        <stop offset="100%" stop-color="#17E5B0"/>
      </linearGradient>
    </defs>
    <path d="M20 2L3 24H14L10 42L27 20H16L20 2Z" fill="url(#lg)"/>
  </svg>
</div>
<script>
  window.addEventListener('load',function(){
    var l=document.getElementById('sp-loader');
    if(l){l.style.opacity='0';setTimeout(function(){l.remove();},300);}
  });
</script>
